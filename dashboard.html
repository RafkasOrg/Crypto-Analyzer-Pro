<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Crypto Analyzer Pro - Whale Tracker</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      background-color: #0f172a;
      color: #e2e8f0;
    }
    .card {
      background-color: #1e293b;
      color: white;
      border: none;
      border-radius: 12px;
    }
    .wallet-alert {
      font-size: 0.9rem;
    }
    .alert-badge {
      background: #dc3545;
      border-radius: 8px;
      padding: 4px 8px;
      color: white;
    }
    .header-title {
      font-size: 1.8rem;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <div class="header-title">🐋 Whale Tracker Pro</div>
      <button class="btn btn-light btn-sm" onclick="loadWhaleAlerts()">🔄 Refresh</button>
    </div>

    <div class="row" id="whale-alert-container">
      <!-- Whale alerts will be injected here -->
    </div>

    <hr class="border-secondary mt-5" />
    <div class="text-muted text-center">
      <small>Data powered by <strong>CoinGecko</strong>, <strong>Dune</strong>, <strong>Whale Alert</strong>, <strong>Supabase</strong></small>
    </div>
  </div>

  <script src="dashboard.js"></script>
</body>
</html>
