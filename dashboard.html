<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Whale Tracker Pro</title>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"/>
</head>
<body class="bg-dark text-white">

  <div class="container py-4">
    <h2 class="mb-4">🐋 Whale Tracker Pro</h2>

    <form id="wallet-form" class="mb-3">
      <div class="input-group">
        <input type="text" id="wallet-address" class="form-control" placeholder="Masukkan wallet address (ETH/BSC/SOL)" required />
        <button type="submit" class="btn btn-success">Tambah Wallet</button>
      </div>
    </form>

    <h5>📋 Wallet Favorit Anda:</h5>
    <ul id="wallet-list" class="list-group mb-4"></ul>

    <h5>📊 Aktivitas Wallet Terakhir:</h5>
    <div id="wallet-activity" class="bg-light text-dark p-3 rounded"></div>
  </div>

  <script src="dashboard.js"></script>
</body>
</html>
