<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Crypto Analyzer Pro</title>
  <link rel="stylesheet" href="style.css" />
  <script defer src="dashboard.js"></script>
</head>
<body>
  <header>
    <h1>Crypto Analyzer Pro</h1>
    <nav>
      <ul>
        <li><a href="#market">Market</a></li>
        <li><a href="#sentiment">Sentiment</a></li>
        <li><a href="#wallets">Wallets</a></li>
        <li><a href="#alerts">Smart Alerts</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <!-- Market Fundamentals -->
    <section id="market">
      <h2>Market Fundamentals</h2>
      <div id="market-data"></div>
    </section>

    <!-- Sentiment Analyzer -->
    <section id="sentiment">
      <h2>Sentiment Analyzer</h2>
      <canvas id="sentimentChart"></canvas>
      <div id="sentiment-table"></div>
    </section>

    <!-- Wallet Tracker -->
    <section id="wallets">
      <h2>Wallet Tracker</h2>
      <div id="wallet-data"></div>
    </section>

    <!-- Smart Alerts -->
    <section id="alerts">
      <h2>Smart Alerts & Auto-Trading</h2>
      <div id="alerts-section"></div>
    </section>
  </main>

  <footer>
    <p>Data powered by CoinGecko, Dune, WhaleAlert, etc.</p>
  </footer>
</body>
</html>
