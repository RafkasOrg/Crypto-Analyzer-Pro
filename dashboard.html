<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Whale Alert Tracker</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script defer src="dashboard.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0d1117;
      color: white;
      margin: 0;
      padding: 20px;
    }
    h1 {
      color: #58a6ff;
    }
    button {
      background: #238636;
      color: white;
      border: none;
      padding: 10px 20px;
      margin-bottom: 20px;
      cursor: pointer;
      font-size: 16px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }
    th, td {
      border: 1px solid #30363d;
      padding: 12px;
      text-align: left;
    }
    th {
      background: #161b22;
    }
    tr:nth-child(even) {
      background: #1c2128;
    }
  </style>
</head>
<body>
  <h1>🐋 Whale Alert Tracker</h1>
  <button onclick="loadWhaleData()">🔄 Refresh Data</button>
  <table id="whaleTable">
    <thead>
      <tr>
        <th>Time</th>
        <th>Token</th>
        <th>Amount</th>
        <th>From</th>
        <th>To</th>
        <th>Tx Hash</th>
      </tr>
    </thead>
    <tbody>
      <!-- Whale alert data akan ditampilkan di sini -->
    </tbody>
  </table>
</body>
</html>
