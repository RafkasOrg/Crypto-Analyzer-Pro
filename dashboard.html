<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Whale Tracker Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <style>
    body { background-color: #1e1e1e; color: white; padding: 20px; }
    .section-title { margin-top: 20px; }
    input, .form-control, .btn { border-radius: 6px; }
  </style>
</head>
<body>
  <h2>🐋 Whale Tracker Pro</h2>

  <div class="mb-3">
    <input id="walletInput" type="text" placeholder="Masukkan wallet address (ETH/BSC/SOL)" class="form-control" />
    <button id="addWallet" class="btn btn-success mt-2">Tambah Wallet</button>
  </div>

  <h4 class="section-title">📁 Wallet Favorit Anda:</h4>
  <ul id="walletList" class="list-group mb-4"></ul>

  <h4 class="section-title">📊 Aktivitas Wallet Terakhir:</h4>
  <div id="walletActivity">Memuat aktivitas...</div>

  <!-- Supabase client -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script type="module" src="dashboard.js"></script>
</body>
</html>
